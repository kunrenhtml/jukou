<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>受講生登録 - 受講生管理システム</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="app-container" id="app">
    <main class="main-content" id="main-content">
      <div class="page-content">
        <div class="mb-4">
          <a href="student_list.html" class="text-muted"><i class="fas fa-arrow-left"></i> 受講生一覧に戻る</a>
        </div>
        
        <h1 class="page-title mb-6">新規受講生登録</h1>

        <div class="card" style="max-width: 800px;">
          <div class="card-body">
            <form action="student_list.html">
              <h3 class="mb-4" style="border-bottom: 1px solid var(--border); padding-bottom: 0.5rem;">基本情報</h3>
              
              <div class="grid grid-cols-2 gap-4">
                <div class="form-group">
                  <label class="form-label">氏名 <span class="text-danger" style="color: var(--danger);">*</span></label>
                  <input type="text" class="form-control" required placeholder="山田 太郎">
                </div>
                <div class="form-group">
                  <label class="form-label">フリガナ <span class="text-danger" style="color: var(--danger);">*</span></label>
                  <input type="text" class="form-control" required placeholder="ヤマダ タロウ">
                </div>
              </div>

              <div class="grid grid-cols-2 gap-4">
                <div class="form-group">
                  <label class="form-label">メールアドレス <span class="text-danger" style="color: var(--danger);">*</span></label>
                  <input type="email" class="form-control" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                  <label class="form-label">電話番号</label>
                  <input type="tel" class="form-control" placeholder="090-1234-5678">
                </div>
              </div>

              <div class="grid grid-cols-2 gap-4">
                <div class="form-group">
                  <label class="form-label">生年月日</label>
                  <input type="date" class="form-control">
                </div>
                <div class="form-group">
                  <label class="form-label">性別</label>
                  <select class="form-control">
                    <option value="">選択してください</option>
                    <option value="male">男性</option>
                    <option value="female">女性</option>
                    <option value="other">その他</option>
                    <option value="not_say">回答しない</option>
                  </select>
                </div>
              </div>

              <div class="form-group">
                <label class="form-label">郵便番号</label>
                <div class="flex space-x-2" style="max-width: 200px;">
                  <input type="text" class="form-control" placeholder="100-0001">
                  <button type="button" class="btn btn-secondary">住所検索</button>
                </div>
              </div>

              <div class="form-group">
                <label class="form-label">住所</label>
                <input type="text" class="form-control mb-2" placeholder="都道府県・市区町村・番地">
                <input type="text" class="form-control" placeholder="建物名・部屋番号">
              </div>

              <h3 class="mt-6 mb-4" style="border-bottom: 1px solid var(--border); padding-bottom: 0.5rem;">アカウント設定</h3>
              
              <div class="grid grid-cols-2 gap-4">
                <div class="form-group">
                  <label class="form-label">初期パスワード <span class="text-danger" style="color: var(--danger);">*</span></label>
                  <input type="password" class="form-control" required>
                </div>
                <div class="form-group">
                  <label class="form-label">パスワード（確認用） <span class="text-danger" style="color: var(--danger);">*</span></label>
                  <input type="password" class="form-control" required>
                </div>
              </div>
              <div class="form-group flex items-center">
                <input type="checkbox" id="sendEmail" checked style="margin-right: 0.5rem;">
                <label for="sendEmail" style="font-size: 0.875rem;">登録完了メールを送信する</label>
              </div>

              <div class="mt-6 pt-4 border-t flex justify-end space-x-2" style="border-top: 1px solid var(--border);">
                <button type="button" class="btn btn-secondary" onclick="history.back()">キャンセル</button>
                <button type="submit" class="btn btn-primary">登録する</button>
              </div>
            </form>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
