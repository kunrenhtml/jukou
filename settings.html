<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>システム設定 - 受講生管理システム</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="app-container" id="app">
    <main class="main-content" id="main-content">
      <div class="page-content">
        <h1 class="page-title mb-6">システム設定</h1>

        <div class="grid grid-cols-3 gap-6">
          <div class="col-span-1" style="grid-column: span 1;">
            <div class="card">
              <div class="card-body" style="padding: 0;">
                <ul class="nav-list" style="margin: 0;">
                  <li class="nav-item" style="margin-bottom: 0;">
                    <a href="#" class="nav-link active" style="border-radius: 0; padding: 1rem 1.5rem;"><i class="fas fa-building"></i> 基本設定</a>
                  </li>
                  <li class="nav-item" style="margin-bottom: 0;">
                    <a href="#" class="nav-link" style="border-radius: 0; padding: 1rem 1.5rem;"><i class="fas fa-envelope"></i> メール設定</a>
                  </li>
                  <li class="nav-item" style="margin-bottom: 0;">
                    <a href="#" class="nav-link" style="border-radius: 0; padding: 1rem 1.5rem;"><i class="fas fa-shield-alt"></i> セキュリティ</a>
                  </li>
                  <li class="nav-item" style="margin-bottom: 0;">
                    <a href="#" class="nav-link" style="border-radius: 0; padding: 1rem 1.5rem;"><i class="fas fa-users-cog"></i> 権限管理</a>
                  </li>
                </ul>
              </div>
            </div>
          </div>

          <div class="col-span-2" style="grid-column: span 2;">
            <div class="card">
              <div class="card-header">
                <h2 class="card-title">基本設定</h2>
              </div>
              <div class="card-body">
                <form>
                  <div class="form-group">
                    <label class="form-label">システム・スクール名</label>
                    <input type="text" class="form-control" value="EduManage">
                  </div>
                  
                  <div class="form-group">
                    <label class="form-label">ロゴ画像</label>
                    <div class="flex items-center space-x-4">
                      <div style="width: 64px; height: 64px; background: #e0e7ff; color: #4f46e5; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; border-radius: var(--radius-md);">
                        <i class="fas fa-graduation-cap"></i>
                      </div>
                      <button type="button" class="btn btn-secondary">ファイルを選択</button>
                    </div>
                  </div>

                  <div class="form-group">
                    <label class="form-label">タイムゾーン</label>
                    <select class="form-control">
                      <option value="Asia/Tokyo" selected>Asia/Tokyo (JST)</option>
                      <option value="UTC">UTC</option>
                    </select>
                  </div>

                  <div class="form-group">
                    <label class="form-label">日付フォーマット</label>
                    <select class="form-control">
                      <option value="YYYY/MM/DD" selected>YYYY/MM/DD</option>
                      <option value="YYYY-MM-DD">YYYY-MM-DD</option>
                    </select>
                  </div>

                  <div class="mt-6 pt-4 border-t flex justify-end" style="border-top: 1px solid var(--border);">
                    <button type="button" class="btn btn-primary" onclick="alert('設定を保存しました')">設定を保存</button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
