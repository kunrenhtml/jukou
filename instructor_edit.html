<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>講師編集 - 受講生管理システム</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="app-container" id="app">
    <main class="main-content" id="main-content">
      <div class="page-content">
        <div class="mb-4">
          <a href="instructor_list.html" class="text-muted"><i class="fas fa-arrow-left"></i> 講師一覧に戻る</a>
        </div>
        
        <div class="flex justify-between items-center mb-6">
          <h1 class="page-title mb-0">講師編集: 田中 健太</h1>
          <button class="btn btn-danger btn-sm"><i class="fas fa-trash-alt"></i> 削除</button>
        </div>

        <div class="card" style="max-width: 800px;">
          <div class="card-body">
            <form action="instructor_detail.html">
              <h3 class="mb-4" style="border-bottom: 1px solid var(--border); padding-bottom: 0.5rem;">基本情報</h3>
              
              <div class="grid grid-cols-2 gap-4">
                <div class="form-group">
                  <label class="form-label">氏名 <span class="text-danger" style="color: var(--danger);">*</span></label>
                  <input type="text" class="form-control" required value="田中 健太">
                </div>
                <div class="form-group">
                  <label class="form-label">フリガナ <span class="text-danger" style="color: var(--danger);">*</span></label>
                  <input type="text" class="form-control" required value="タナカ ケンタ">
                </div>
              </div>

              <div class="grid grid-cols-2 gap-4">
                <div class="form-group">
                  <label class="form-label">メールアドレス <span class="text-danger" style="color: var(--danger);">*</span></label>
                  <input type="email" class="form-control" required value="kenta.tanaka@example.com">
                </div>
                <div class="form-group">
                  <label class="form-label">電話番号</label>
                  <input type="tel" class="form-control" value="090-9876-5432">
                </div>
              </div>

              <div class="grid grid-cols-2 gap-4">
                <div class="form-group">
                  <label class="form-label">肩書き・職種 <span class="text-danger" style="color: var(--danger);">*</span></label>
                  <input type="text" class="form-control" required value="Webエンジニア">
                </div>
                <div class="form-group">
                  <label class="form-label">ステータス</label>
                  <select class="form-control">
                    <option value="active" selected>稼働中</option>
                    <option value="inactive">休職中</option>
                  </select>
                </div>
              </div>

              <div class="form-group">
                <label class="form-label">専門分野・スキル（カンマ区切り）</label>
                <input type="text" class="form-control" value="JavaScript, React, Node.js, TypeScript">
              </div>

              <div class="form-group">
                <label class="form-label">プロフィール</label>
                <textarea class="form-control" rows="4">現役のフロントエンドエンジニア。実務に即した実践的なコーディング指導が得意。初心者にも分かりやすい丁寧な解説が好評。</textarea>
              </div>

              <div class="mt-6 pt-4 border-t flex justify-end space-x-2" style="border-top: 1px solid var(--border);">
                <button type="button" class="btn btn-secondary" onclick="history.back()">キャンセル</button>
                <button type="submit" class="btn btn-primary">更新する</button>
              </div>
            </form>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
